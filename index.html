<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom — Think Clear. Feel Supported.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Shared */
  --bg:#0e0b0d;
  --text:#f0e8ec;
  --muted:#7a5f6a;
  --border-soft:rgba(232,99,122,0.15);

  /* Overthinking (dark industrial) */
  --ok-bg:#0a0a0a;
  --ok-surface:#111;
  --ok-surface2:#1a1a1a;
  --ok-border:#2a2a2a;
  --ok-accent:#e8ff47;
  --ok-red:#ff4747;
  --ok-text:#e8e8e8;
  --ok-dim:#888;
  --ok-muted:#444;

  /* Bloom (warm rose) */
  --bl-bg:#140d10;
  --bl-surface:#1e1118;
  --bl-card:#271520;
  --bl-card2:#301a28;
  --bl-accent:#e8637a;
  --bl-accent2:#f4a5b0;
  --bl-warm:#f2c4a0;
  --bl-sage:#9ecfb0;
  --bl-sun:#f5d08a;
  --bl-avoid:#e06070;
  --bl-border:rgba(232,99,122,0.15);
}

/* ═══════════════════════════════════
   LANDING / HOME SCREEN
═══════════════════════════════════ */
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated bg gradient */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 15%,rgba(232,255,71,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 85%,rgba(232,99,122,0.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

#landing{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px 80px;
  text-align:center;
  animation:fadeUp .7s ease both;
}

.land-logo{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,8vw,4rem);
  font-weight:600;
  color:#f4a5b0;
  letter-spacing:-.02em;
  margin-bottom:6px;
}
.land-logo em{color:#e8ff47;font-style:italic}
.land-tagline{
  font-family:'IBM Plex Mono',monospace;
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:48px;
}

.land-question{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.1rem,3vw,1.5rem);
  color:#d0b8c0;font-weight:400;
  margin-bottom:32px;line-height:1.4;
}

.mode-cards{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;width:100%;max-width:560px;
  margin-bottom:24px;
}

.mode-card{
  border:1.5px solid;border-radius:20px;
  padding:28px 20px 24px;
  cursor:pointer;transition:all .25s ease;
  text-align:center;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

.mode-card.think{
  background:rgba(10,10,10,0.9);
  border-color:var(--ok-border);
}
.mode-card.think:hover{
  border-color:var(--ok-accent);
  box-shadow:0 0 32px rgba(232,255,71,0.08);
  transform:translateY(-3px);
}

.mode-card.bloom{
  background:rgba(20,13,16,0.9);
  border-color:var(--border-soft);
}
.mode-card.bloom:hover{
  border-color:#e8637a;
  box-shadow:0 0 32px rgba(232,99,122,0.12);
  transform:translateY(-3px);
}

.mc-icon{font-size:2.4rem;display:block;margin-bottom:12px}
.mc-title-think{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5rem;letter-spacing:2px;
  color:var(--ok-accent);margin-bottom:6px;
}
.mc-title-bloom{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:600;
  color:#f4a5b0;margin-bottom:6px;
}
.mc-desc{font-size:.78rem;color:var(--muted);line-height:1.5}

.land-footer{
  font-family:'IBM Plex Mono',monospace;
  font-size:.65rem;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;
  margin-top:32px;cursor:pointer;
  transition:color .2s;
  user-select:none;
}
.land-footer:hover{color:#f4a5b0}

/* ═══════════════════════════════════
   SHARED APP CHROME
═══════════════════════════════════ */
#app{display:none;min-height:100vh;position:relative;z-index:1;}

/* Back button */
.back-btn{
  position:fixed;top:16px;left:16px;z-index:100;
  font-family:'IBM Plex Mono',monospace;
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  padding:8px 14px;background:rgba(0,0,0,0.6);
  border:1px solid #333;color:#888;
  cursor:pointer;transition:all .15s;backdrop-filter:blur(6px);
  border-radius:6px;
}
.back-btn:hover{color:var(--text);border-color:#666}

/* ═══════════════════════════════════
   OVERTHINKING KILLER STYLES
═══════════════════════════════════ */
#ok-app{display:none;}

.ok-wrap{
  max-width:860px;margin:0 auto;padding:0 24px;
}

/* scanlines */
#ok-app::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:9999;
}

.ok-header{
  padding:60px 0 32px;border-bottom:1px solid var(--ok-border);
  animation:fadeDown .6s ease both;
}
.ok-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(44px,8vw,80px);letter-spacing:2px;line-height:.9;
  color:var(--ok-text);
}
.ok-logo span{color:var(--ok-accent);display:block}
.ok-tagline{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--ok-dim);letter-spacing:.15em;text-transform:uppercase;margin-top:12px;
}

.ok-section{padding:48px 0 0;animation:fadeUp .7s ease .1s both}
.ok-slabel{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--ok-muted);letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.ok-slabel::before{content:'//';color:var(--ok-accent)}
.ok-prompt{
  font-size:18px;font-weight:300;color:var(--ok-dim);
  margin-bottom:20px;font-style:italic;line-height:1.5;
}
.ok-prompt strong{color:var(--ok-text);font-style:normal;font-weight:600}

.ok-input-wrap{
  position:relative;border:1px solid var(--ok-border);
  background:var(--ok-surface);transition:border-color .2s;
}
.ok-input-wrap:focus-within{
  border-color:var(--ok-accent);
  box-shadow:0 0 0 1px var(--ok-accent),0 0 32px rgba(232,255,71,.04);
}
.ok-corner{position:absolute;width:8px;height:8px;border-color:var(--ok-accent);border-style:solid;opacity:0;transition:opacity .2s}
.ok-input-wrap:focus-within .ok-corner{opacity:1}
.ok-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.ok-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.ok-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.ok-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

textarea{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--ok-text);font-family:'DM Sans',sans-serif;
  font-size:16px;font-weight:300;line-height:1.7;
  padding:24px;resize:none;min-height:160px;caret-color:var(--ok-accent);
}
textarea::placeholder{color:var(--ok-muted);font-style:italic}

.ok-input-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-top:1px solid var(--ok-border);
}
.ok-char{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ok-muted)}
.mode-sel{display:flex;background:var(--ok-bg);border:1px solid var(--ok-border);padding:3px}
.mode-btn{
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;padding:6px 12px;background:transparent;border:none;
  color:var(--ok-muted);cursor:pointer;transition:all .15s;
}
.mode-btn.active{background:var(--ok-red);color:#000;font-weight:700}
.mode-btn:not(.active):hover{color:var(--ok-text)}

.ok-analyze-row{
  margin-top:20px;display:flex;align-items:center;gap:16px;
  animation:fadeUp .7s ease .2s both;
}
.ok-analyze-btn{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  padding:16px 40px;background:var(--ok-accent);color:#000;
  border:none;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;flex-shrink:0;
}
.ok-analyze-btn::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.15);transform:translateX(-100%);transition:transform .3s ease;
}
.ok-analyze-btn:hover::before{transform:translateX(0)}
.ok-analyze-btn:active{transform:scale(.98)}
.ok-analyze-btn:disabled{opacity:.4;cursor:not-allowed}
.ok-hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ok-muted);line-height:1.6}

.ok-loading-bar{height:2px;background:var(--ok-border);margin:32px 0;position:relative;display:none}
.ok-loading-bar.active{display:block}
.ok-loading-bar::after{
  content:'';position:absolute;top:0;left:0;height:100%;width:40%;
  background:var(--ok-accent);animation:loadSlide 1s ease-in-out infinite;
}
@keyframes loadSlide{0%{left:-40%}100%{left:100%}}
.ok-loading-txt{
  font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ok-accent);
  letter-spacing:.1em;text-align:center;display:none;
  animation:blink 1s step-end infinite;margin-bottom:32px;
}
.ok-loading-txt.active{display:block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.ok-err{
  padding:20px;background:rgba(255,71,71,.05);
  border:1px solid rgba(255,71,71,.2);
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  color:var(--ok-red);line-height:1.7;display:none;margin-top:24px;
}
.ok-err.visible{display:block}

.ok-out{margin-top:48px;padding-bottom:80px;display:none}
.ok-out.visible{display:block}
.ok-out-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--ok-border);
}
.ok-out-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--ok-accent)}
.ok-out-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ok-muted);text-align:right;line-height:1.8}
.brutal-tag{display:inline-block;background:var(--ok-red);color:#fff;padding:2px 6px;font-size:9px;letter-spacing:.1em;vertical-align:middle;margin-left:6px}

.cards-grid{display:flex;flex-direction:column;gap:3px}
.card{
  background:var(--ok-surface);border-left:3px solid transparent;
  overflow:hidden;opacity:0;transform:translateX(-16px);
  animation:slideIn .4s ease forwards;
}
.card:nth-child(1){animation-delay:.05s;border-left-color:#888}
.card:nth-child(2){animation-delay:.15s;border-left-color:#5599ff}
.card:nth-child(3){animation-delay:.25s;border-left-color:var(--ok-red)}
.card:nth-child(4){animation-delay:.35s;border-left-color:#ff9f40}
.card:nth-child(5){animation-delay:.45s;border-left-color:var(--ok-accent)}
.card:nth-child(6){animation-delay:.55s;border-left-color:#a78bfa}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}

.card-hdr{
  display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:var(--ok-surface2);cursor:pointer;user-select:none;transition:background .15s;
}
.card-hdr:hover{background:#222}
.card-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ok-muted);line-height:1;flex-shrink:0}
.card-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ok-dim);flex:1}
.card-tog{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--ok-muted);transition:transform .2s}
.card.collapsed .card-tog{transform:rotate(-90deg)}
.card-body{padding:20px 20px 20px 60px;border-top:1px solid var(--ok-border)}
.card.collapsed .card-body{display:none}

/* Card content types */
.situation-txt{font-size:17px;font-weight:600;line-height:1.5;color:var(--ok-text)}
.emotion-validation{
  background:rgba(232,255,71,.04);border-left:3px solid var(--ok-accent);
  padding:14px 16px;font-size:14px;color:#c8d890;line-height:1.7;font-style:italic;
}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ctrl-col{padding:14px;border:1px solid var(--ok-border)}
.ctrl-col-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.ctrl-col.yours .ctrl-col-lbl{color:#5599ff}
.ctrl-col.theirs .ctrl-col-lbl{color:var(--ok-muted)}
.ctrl-items{list-style:none;display:flex;flex-direction:column;gap:6px}
.ctrl-items li{font-size:14px;font-weight:300;color:var(--ok-dim);padding-left:14px;position:relative;line-height:1.4}
.ctrl-col.yours .ctrl-items li::before{content:'→';position:absolute;left:0;color:#5599ff;font-size:12px}
.ctrl-col.theirs .ctrl-items li::before{content:'✕';position:absolute;left:0;color:var(--ok-muted);font-size:10px;top:2px}
.worst-txt{font-size:15px;font-weight:300;line-height:1.7;color:var(--ok-dim);border-left:2px solid var(--ok-red);padding-left:16px;font-style:italic}
.reality-items{list-style:none;display:flex;flex-direction:column;gap:12px}
.reality-item{display:flex;gap:12px;align-items:flex-start}
.rtag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 6px;border:1px solid;white-space:nowrap;flex-shrink:0;margin-top:2px}
.rtag.assumption{border-color:#ff9f40;color:#ff9f40}
.rtag.bias{border-color:var(--ok-red);color:var(--ok-red)}
.rtag.fact{border-color:#5599ff;color:#5599ff}
.rtag.exaggeration{border-color:#a78bfa;color:#a78bfa}
.rtag.reframe{border-color:var(--ok-accent);color:var(--ok-accent)}
.reality-txt{font-size:14px;font-weight:300;line-height:1.6;color:var(--ok-dim)}

/* SOLUTIONS — key improvement */
.solutions-list{list-style:none;display:flex;flex-direction:column;gap:14px}
.sol-item{
  background:var(--ok-surface2);border-left:3px solid var(--ok-accent);
  padding:16px 18px;
}
.sol-step{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;
  color:var(--ok-accent);margin-bottom:6px;display:block;
}
.sol-action{font-size:15px;font-weight:500;color:var(--ok-text);line-height:1.4;margin-bottom:4px}
.sol-why{font-size:13px;font-weight:300;color:var(--ok-dim);line-height:1.5}
.sol-script{
  margin-top:10px;background:rgba(232,255,71,.04);
  border:1px solid rgba(232,255,71,.12);
  padding:10px 12px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;color:#c8d890;line-height:1.6;font-style:italic;
}
.sol-script::before{content:'Say: ';color:var(--ok-accent);font-style:normal}

.brutal-callout{
  background:rgba(255,71,71,.06);border:1px solid rgba(255,71,71,.2);
  padding:14px 16px;margin-top:16px;font-size:13px;color:#ff7070;
  font-weight:300;line-height:1.6;font-style:italic;
}
.brutal-callout::before{
  content:'⚠ BRUTAL TRUTH: ';font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:.1em;font-style:normal;font-weight:700;
  color:var(--ok-red);display:block;margin-bottom:6px;
}

/* Comfort card (for emotional situations) */
.comfort-card{
  background:rgba(232,99,122,.05);border:1px solid rgba(232,99,122,.18);
  padding:16px 18px;margin-top:12px;
}
.comfort-card p{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:14px;color:#f4a5b0;line-height:1.7;
}

.ok-reset-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;padding:10px 20px;background:transparent;
  border:1px solid var(--ok-border);color:var(--ok-dim);cursor:pointer;
  transition:all .15s;margin-top:32px;
}
.ok-reset-btn:hover{border-color:var(--ok-dim);color:var(--ok-text)}

/* ok footer */
.ok-footer{
  border-top:1px solid var(--ok-border);padding:24px 0;
  display:flex;align-items:center;justify-content:space-between;margin-top:40px;
}
.ok-footer-txt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ok-muted);letter-spacing:.1em;text-transform:uppercase}

/* ═══════════════════════════════════
   BLOOM STYLES
═══════════════════════════════════ */
#bloom-app{display:none;}

.bl-wrap{
  position:relative;z-index:1;
  max-width:660px;margin:0 auto;
  padding:36px 18px 80px;
}
#bloom-app::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 8%,rgba(232,99,122,.1) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 85% 92%,rgba(160,70,110,.08) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

.bl-header{text-align:center;margin-bottom:40px;animation:fadeDown .65s ease both}
.bl-logo{
  font-family:'Playfair Display',serif;
  font-size:2.4rem;font-weight:600;color:var(--bl-accent2);letter-spacing:-.02em;
}
.bl-logo em{color:var(--bl-accent);font-style:italic}
.bl-tagline{
  margin-top:6px;color:var(--muted);font-size:.78rem;
  letter-spacing:.12em;text-transform:uppercase;font-weight:300;
}

.bl-steps{
  display:flex;align-items:center;justify-content:center;
  gap:8px;margin-bottom:32px;animation:fadeUp .6s .05s ease both;
}
.bl-step-dot{width:28px;height:4px;border-radius:99px;background:var(--bl-surface);transition:background .3s}
.bl-step-dot.done{background:var(--bl-accent)}
.bl-step-dot.active{background:var(--bl-accent2)}

.bl-panel{display:none;animation:fadeUp .45s ease both}
.bl-panel.active{display:block}
.bl-slabel{
  font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;font-weight:500;
}
.bl-heading{
  font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--bl-accent2);
  margin-bottom:6px;font-weight:600;line-height:1.3;
}
.bl-sub{color:var(--muted);font-size:.88rem;margin-bottom:24px;line-height:1.6}

.mood-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
.mood-btn{
  background:var(--bl-card);border:1.5px solid var(--bl-border);border-radius:18px;
  padding:20px 14px 16px;cursor:pointer;transition:all .2s ease;text-align:center;
  position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
}
.mood-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,99,122,.07),transparent);opacity:0;transition:opacity .2s;
}
.mood-btn:hover::after,.mood-btn.picked::after{opacity:1}
.mood-btn:hover{border-color:rgba(232,99,122,.4);transform:translateY(-2px)}
.mood-btn.picked{border-color:var(--bl-accent);box-shadow:0 0 0 3px rgba(232,99,122,.12);transform:translateY(-2px)}
.mood-emoji{font-size:2rem;display:block;margin-bottom:8px}
.mood-lbl{font-size:.85rem;font-weight:500;color:var(--text)}
.mood-desc-bl{font-size:.74rem;color:var(--muted);margin-top:3px;line-height:1.4}
.mood-btn.picked .mood-lbl{color:var(--bl-accent2)}

.sym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:28px}
.sym-btn{
  background:var(--bl-card);border:1.5px solid var(--bl-border);border-radius:16px;
  padding:16px 8px 13px;cursor:pointer;transition:all .2s ease;text-align:center;
  position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
}
.sym-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,99,122,.07),transparent);opacity:0;transition:opacity .2s;
}
.sym-btn:hover::after,.sym-btn.on::after{opacity:1}
.sym-btn:hover{border-color:rgba(232,99,122,.4);transform:translateY(-2px)}
.sym-btn.on{border-color:var(--bl-accent);box-shadow:0 0 0 3px rgba(232,99,122,.12);transform:translateY(-2px)}
.sym-icon{font-size:1.6rem;display:block;margin-bottom:5px}
.sym-name{font-size:.77rem;font-weight:500;color:var(--text);line-height:1.2}
.sym-btn.on .sym-name{color:var(--bl-accent2)}

.intensity-box{
  background:var(--bl-card);border:1.5px solid var(--bl-border);
  border-radius:16px;padding:18px 20px;margin-bottom:28px;
}
.int-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.int-val{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--bl-accent)}
input[type=range]{
  width:100%;-webkit-appearance:none;appearance:none;height:5px;
  border-radius:99px;outline:none;cursor:pointer;
  background:linear-gradient(to right,var(--bl-accent) 0%,var(--bl-accent) var(--v,25%),var(--bl-surface) var(--v,25%));
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--bl-accent);box-shadow:0 0 10px rgba(232,99,122,.4);transition:transform .15s;
}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
