<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERTHINKING KILLER // V3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; cursor: crosshair; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 9999; }
  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

  header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); animation: fadeDown 0.6s ease both; }
  .logo { font-family: var(--display); font-size: clamp(44px, 8vw, 80px); letter-spacing: 2px; line-height: 0.9; }
  .logo span { color: var(--accent); display: block; }
  .tagline { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 12px; }

  .input-section { padding: 48px 0 0; animation: fadeUp 0.7s ease 0.1s both; }
  .section-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: '//'; color: var(--accent); }

  .input-wrapper { position: relative; border: 1px solid var(--border); background: var(--surface); }
  .input-wrapper:focus-within { border-color: var(--accent); }
  textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 16px; padding: 24px; resize: none; min-height: 160px; caret-color: var(--accent); }
  
  .input-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-top: 1px solid var(--border); }
  .mode-selector { display: flex; background: var(--bg); border: 1px solid var(--border); padding: 3px; }
  .mode-btn { font-family: var(--mono); font-size: 10px; padding: 6px 12px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent2); color: #000; font-weight: 700; }

  .analyze-btn { font-family: var(--display); font-size: 22px; letter-spacing: 3px; padding: 16px 40px; background: var(--accent); color: #000; border: none; cursor: pointer; margin-top: 20px; }

  .loading-bar { height: 2px; background: var(--border); margin: 32px 0; position: relative; display: none; }
  .loading-bar.active { display: block; }
  .loading-bar::after { content: ''; position: absolute; height: 100%; width: 40%; background: var(--accent); animation: loadSlide 1s infinite; }
  @keyframes loadSlide { 0% { left: -40%; } 100% { left: 100%; } }

  .output-section { margin-top: 48px; padding-bottom: 80px; display: none; }
  .output-section.visible { display: block; }

  .card { background: var(--surface); border-left: 3px solid var(--accent); margin-bottom: 8px; animation: fadeUp 0.4s ease forwards; }
  .card-header { padding: 15px 20px; background: var(--surface2); font-family: var(--mono); font-size: 11px; color: var(--accent); text-transform: uppercase; }
  .card-body { padding: 20px; line-height: 1.6; }

  .solution-item { border-bottom: 1px solid var(--border); padding: 12px 0; }
  .solution-item:last-child { border: none; }
  .sol-tag { color: var(--accent); font-family: var(--mono); font-size: 10px; margin-right: 8px; }

  .brutal-box { background: rgba(255, 71, 71, 0.1); border: 1px solid var(--accent2); padding: 16px; color: var(--accent2); font-style: italic; margin-top: 12px; }
  
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">OVER<span>THINKING</span>KILLER</div>
    <div class="tagline">Weighted Solution Engine V3.0 // Systemic Clarity</div>
  </header>

  <section class="input-section">
    <div class="section-label">Neural Dump</div>
    <div class="input-wrapper">
      <textarea id="thoughtInput" placeholder='Dump the messy thoughts here...'></textarea>
      <div class="input-footer">
        <span id="charCount" style="font-size:10px; color:var(--text-muted); font-family:var(--mono)">0 chars</span>
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="standard">Standard</button>
          <button class="mode-btn" data-mode="brutal">Brutal</button>
        </div>
      </div>
    </div>
    <button class="analyze-btn" id="analyzeBtn">ANALYZE SYSTEM</button>
  </section>

  <div class="loading-bar" id="loadingBar"></div>

  <section class="output-section" id="outputSection">
    <div id="cardsGrid"></div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--text-dim); padding:10px; cursor:pointer; font-family:var(--mono); font-size:10px; margin-top:20px;">↺ RESET SYSTEM</button>
  </section>
</div>

<script>
// ═══════════════════════════════════════════════
//  RULE DATABASE: CATEGORIES & SOLUTIONS
// ═══════════════════════════════════════════════

const RULES = {
  exam_anxiety: {
    weights: { 'exam':5, 'tomorrow':4, 'study':3, 'questions':4, 'prepared':3, 'fail':4, 'midsem':5, 'mse':5 },
    situations: ["The system is predicting a catastrophic failure based on zero data points."],
    solutions: [
      "The 50/10 Protocol: Deep study for 50 mins, total rest for 10. Avoid 'passive reading'; solve 3 problems instead.",
      "Scope Management: Stop trying to master the whole syllabus. Master 60% of it perfectly. It's enough to pass and lowers anxiety.",
      "The Worst-Case Audit: If you fail, you retake. It is a time penalty, not a life-over scenario. Re-calibrate stakes."
    ],
    brutalTruths: ["Thinking about the exam isn't studying. You are using anxiety as a substitute for effort. Open the book."]
  },
  social_betrayal: {
    weights: { 'friends':3, 'secrets':5, 'betrayal':5, 'fun':4, 'revealing':5, 'hurts':3, 'told':2 },
    situations: ["Detection of a trust-breach in the primary social circle."],
    solutions: [
      "Immediate Information Blackout: These 'friends' have lost their clearance level. Stop feeding them data.",
      "The Power-Move Silence: Do not argue. Do not explain. Just stop being available. Silence is the most expensive response.",
      "Environment Pivot: Your current social 'hardware' is faulty. Focus on solo projects or new lab partners for 14 days."
    ],
    brutalTruths: ["If they are revealing your secrets, they aren't 'friends' having fun. They are enemies you mistakenly invited home."]
  },
  relationship: {
    weights: { 'texted':4, 'reply':4, 'crush':5, 'friend':2, 'more than':5, 'he':1, 'she':1, 'ghosted':5 },
    situations: ["The brain is stuck in a loop trying to decode external silence."],
    solutions: [
      "Admission of Intent: Stop saying 'he is just a friend'. Admit the crush. Vulnerability within yourself kills the anxiety of the unknown.",
      "The 24-Hour Wait: If he hasn't texted, put your phone in a drawer. If he wants to find you, he will. If not, you have your answer.",
      "Energy Re-Allocation: Use the 'text-waiting' energy to finish one engineering task. Turn romantic frustration into productivity."
    ],
    brutalTruths: ["No one is too busy to send a 5-second text. Silence is not a mystery; it is a lack of priority. Accept it and move on."]
  },
  restrictions: {
    weights: { 'parents':5, 'outside':5, 'letting':4, 'house':3, 'stuck':3 },
    situations: ["External constraints are causing internal pressure buildup."],
    solutions: [
      "The 'Negotiated Freedom' Strategy: Don't ask to go out. Propose a trade: 'I finish Module 3, I get 30 mins outside'. Use logic, not emotion.",
      "Physical Decompression: If stuck inside, do a high-intensity 15-min workout. It forces the body to stop the flight-or-fight response.",
      "The 'Long-Game' Mindset: This is a temporary environment. Treat it like a boring internship. It will end."
    ],
    brutalTruths: ["Your parents are annoying because they are scared for you. It's a bad UI, but the source code is love. Stop fighting the UI."]
  },
  default: {
    weights: {},
    situations: ["General systemic overthinking detected."],
    solutions: ["Break the current task into 5-minute chunks.", "Drink 500ml of water and walk for 5 minutes.", "Write down the #1 thing you are avoiding and do it for 60 seconds."],
    brutalTruths: ["You already know what to do. You're just here to avoid doing it."]
  }
};

// ═══════════════════════════════════════════════
//  ENGINE LOGIC
// ═══════════════════════════════════════════════

function analyze() {
  const input = document.getElementById('thoughtInput').value.trim();
  if (input.length < 10) return alert("System requires more data. Please describe your situation more fully.");
  
  const mode = document.querySelector('.mode-btn.active').dataset.mode;
  document.getElementById('loadingBar').classList.add('active');

  setTimeout(() => {
    const result = runLogic(input, mode);
    renderOutput(result);
    document.getElementById('loadingBar').classList.remove('active');
    document.getElementById('outputSection').classList.add('visible');
    document.getElementById('outputSection').scrollIntoView({behavior:'smooth'});
  }, 800);
}

function runLogic(text, mode) {
  const lower = text.toLowerCase();
  let bestCat = 'default';
  let maxScore = 0;

  // Weight Calculation
  for (const [cat, rule] of Object.entries(RULES)) {
    let score = 0;
    for (const [word, weight] of Object.entries(rule.weights)) {
      if (lower.includes(word)) score += weight;
    }
    if (score > maxScore) {
      maxScore = score;
      bestCat = cat;
    }
  }

  const selected = RULES[bestCat];

  // Subject Extraction Logic
  let subject = "Unknown Variable";
  const markers = ["about ", "over ", "because ", "worried "];
  for (let m of markers) {
    if (lower.includes(m)) {
      subject = text.split(new RegExp(m, 'i'))[1].split(/[.!,]/)[0];
      break;
    }
  }

  return {
    subject: subject,
    situation: selected.situations[0],
    solutions: selected.solutions,
    brutal: mode === 'brutal' ? selected.brutalTruths[0] : null
  };
}

function renderOutput(data) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = `
    <div class="card">
      <div class="card-header">Target Analysis</div>
      <div class="card-body">Obsession focus: <span style="color:var(--accent)">${data.subject}</span></div>
    </div>
    <div class="card">
      <div class="card-header">Systemic Diagnosis</div>
      <div class="card-body">${data.situation}</div>
    </div>
    <div class="card" style="border-left-color: #5599ff">
      <div class="card-header" style="color:#5599ff">Actionable Solutions</div>
      <div class="card-body">
        ${data.solutions.map(sol => `
          <div class="solution-item">
            <span class="sol-tag">[FIX]</span> ${sol}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (data.brutal) {
    grid.innerHTML += `
      <div class="brutal-box">
        <strong>⚠️ BRUTAL OVERRIDE:</strong><br>${data.brutal}
      </div>
    `;
  }
}

// UI HANDLERS
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('thoughtInput').addEventListener('input', (e) => {
  document.getElementById('charCount').textContent = e.target.value.length + " chars";
});
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
